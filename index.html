<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Player</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
display:flex;
justify-content:center;
padding:20px;
}

.wrapper{
width:100%;
max-width:900px;
}

.player{
position:relative;
width:100%;
aspect-ratio:16/9;
background:#000;
border:2px solid #2b2b2b;
border-radius:18px;
overflow:hidden;
}

.live{
position:absolute;
top:20px;
left:20px;
background:#ff3b3b;
color:#fff;
padding:10px 22px;
border-radius:8px;
font-weight:bold;
font-size:20px;
z-index:5;
}

.overlay{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
background:#000;
z-index:4;
}

.play{
width:130px;
height:130px;
border-radius:50%;
background:rgba(255,255,255,.15);
border:4px solid rgba(255,255,255,.7);
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
color:#fff;
box-shadow:0 0 40px rgba(255,255,255,.3);
}

.tap{
margin-top:18px;
font-size:34px;
color:#ddd;
letter-spacing:2px;
}

iframe{
display:none;
width:100%;
height:100%;
border:0;
}

.btn{
margin-top:20px;
width:100%;
height:65px;
background:#f2b233;
border:none;
border-radius:12px;
font-size:28px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="player" id="player">

<div class="live">● LIVE</div>

<div class="overlay" id="overlay">
<div class="play">▶</div>
<div class="tap">TAP TO WATCH</div>
</div>

<iframe
id="video"
allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
allowfullscreen>
</iframe>

</div>

<button class="btn" onclick="fullscreenPlayer()">⛶ Fullscreen</button>

</div>

<script>

const overlay=document.getElementById("overlay");
const video=document.getElementById("video");

overlay.addEventListener("click",function(){

video.src="https://vileembeds.pages.dev/embed/fox-sports-1-4k";

video.style.display="block";

overlay.style.display="none";

});

function fullscreenPlayer(){

const player=document.getElementById("player");

if(player.requestFullscreen){
player.requestFullscreen();
}
else if(player.webkitRequestFullscreen){
player.webkitRequestFullscreen();
}
else if(player.msRequestFullscreen){
player.msRequestFullscreen();
}

}

</script>

</body>
</html>
