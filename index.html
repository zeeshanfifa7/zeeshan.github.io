<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>
<body>

<iframe
    src="https://streamzy.qzz.io/"
    allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
    allowfullscreen>
</iframe>

</body>
</html>
